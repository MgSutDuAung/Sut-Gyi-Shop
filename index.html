<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sut-Gyi-Shop | Gaming Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Sut-Gyi-Shop</h1>
            <p>Gaming Top-up & Services</p>
        </header>

        <div class="shop-grid">
            <div class="card mlbb-card">
                <div class="hero-overlay"></div>
                <img src="https://img.icons8.com/color/96/mobile-legends.png" alt="MLBB">
                <h2>MLBB Diamonds</h2>
                <p>လျင်မြန်ပြီး စိတ်ချရသော Diamond အားဖြည့်ခြင်း</p>
                <button>ဝယ်ယူမည်</button>
            </div>

            <div class="card pubg-card">
                <div class="uc-overlay"></div>
                <img src="https://img.icons8.com/color/96/pubg.png" alt="PUBG">
                <h2>PUBG UC</h2>
                <p>UC ဈေးနှုန်းအသစ်များဖြင့် အားဖြည့်ပါ</p>
                <button>ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="contact-section">
            <h3>Contact Us</h3>
            <div class="social-links">
                <a href="#" class="social-btn telegram">Telegram</a>
                <a href="#" class="social-btn viber">Viber</a>
            </div>
        </div>
    </div>

</body>
</html>
